# .github/workflows/session-tests.yml  (python throwaway repo)
name: Session tests
on:
  pull_request:
    branches: [main]
  push:
    branches: ['bp/**']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pipx install poetry || pip install poetry
      - run: poetry lock --no-update || poetry lock
      - run: poetry install --no-root --no-interaction
      - run: poetry run pytest
